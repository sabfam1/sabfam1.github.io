<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Grade Engine — Multi-Class Compact</title>
<style>
:root{
  --bg:#000; --card:#0f1113; --panel:#151619; --muted:#94a3b8;
  --text:#fff; --blue:#0a84ff; --danger:#ff3b30; --input:#1e2023; --border:rgba(255,255,255,0.06);
  --radius:12px;
}
html,body{height:100%;margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Segoe UI,Roboto,Arial;color:var(--text);-webkit-font-smoothing:antialiased}
body{display:flex;justify-content:center;padding:10px;box-sizing:border-box}

.card{
  width:100%; max-width:360px;
  background:linear-gradient(180deg,var(--card),#0b0d0f);
  border-radius:16px;
  padding:12px;
  box-sizing:border-box;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

h1{margin:0;text-align:center;color:var(--blue);font-size:20px;font-weight:700}
.spacer{height:10px}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
input[type="text"], input[type="number"], select, button{font-family:inherit;font-size:14px;color:var(--text);}
.field{ margin-top:8px }
.field input[type="text"]{ width:100%;padding:8px 10px;border-radius:10px;border:1px solid var(--border);background:var(--input);box-sizing:border-box;-webkit-appearance:none;}
.weights{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.weights .col input[type="number"]{width:100%;padding:8px 10px;border-radius:10px;border:1px solid var(--border);background:var(--input);box-sizing:border-box;}
.header-row{display:grid;grid-template-columns: 45% 20% 12% 12% 11%;gap:4px;margin-top:10px;align-items:center;}
.th{background:var(--blue);padding:6px 4px;border-radius:8px;text-align:center;font-size:12px;color:#fff;}
.rows{margin-top:8px;max-height:300px;overflow:auto;padding-right:4px;}
.row{display:grid;grid-template-columns: 42% 20% 12% 12% 14%;gap:4px;background:var(--panel);border-radius:10px;padding:6px;align-items:center;margin-bottom:6px;box-sizing:border-box;}
.assign{width:100%;padding:6px 8px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;box-sizing:border-box;}
select.cat{padding:6px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);box-sizing:border-box;width:100%;}
input.score, input.pts{padding:6px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);text-align:center;box-sizing:border-box;max-width:100%;}
input.pts{ max-width:90px }
.remove-wrap{ display:flex; align-items:center; justify-content:center; }
button.remove{ width:32px; height:32px; border-radius:8px; border:none; background:var(--danger); color:#fff; font-size:16px; cursor:pointer;}
.primary{width:100%;padding:10px;margin-top:10px;border-radius:12px;border:none;font-weight:700;background:var(--blue);color:#fff;font-size:14px;cursor:pointer;}
.seg{ display:flex; gap:8px; margin-top:10px; }
.seg button{ flex:1; padding:8px; border-radius:10px; border:1px solid var(--border); background:var(--input); color:var(--text); font-weight:600; cursor:pointer; }
.result{ margin-top:10px; color:var(--muted); font-size:13px }

/* Class selector */
.class-select { width:100%; padding:8px 10px; border-radius:10px; border:1px solid var(--border); background:var(--input); color:var(--text); font-size:14px; appearance:none; cursor:pointer; background-image: url("data:image/svg+xml,%3Csvg fill='white' height='12' viewBox='0 0 24 24' width='12' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M7 10l5 5 5-5z'/%3E%3Cpath d='M0 0h24v24H0z' fill='none'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 10px center; background-size: 12px; padding-right:30px;}
.class-select:hover, .class-select:focus{border-color: var(--blue); background:#1f2226; outline:none;}
</style>
</head>
<body>
<div class="card" role="main" aria-label="Grade Engine">
  <h1>📘 Grade Engine</h1>
  <div class="spacer"></div>

  <div id="classSelectContainer" class="field" style="display:none;">
    <label for="classSelect">Select Class</label>
    <select id="classSelect" class="class-select"></select>
    <button id="deleteClassBtn" style="margin-top:4px;padding:6px 10px;border-radius:10px;background:var(--danger);border:none;color:#fff;cursor:pointer;">Delete Class</button>
  </div>

  <div class="field">
    <label for="className">Class name</label>
    <input id="className" type="text" placeholder="">
  </div>

  <div class="weights" aria-label="Weights">
    <div class="col">
      <label for="testW">Tests %</label>
      <input id="testW" type="number" min="0" max="100" value="60">
    </div>
    <div class="col">
      <label for="quizW">Quizzes %</label>
      <input id="quizW" type="number" min="0" max="100" value="20">
    </div>
    <div class="col">
      <label for="cwW">Classwork %</label>
      <input id="cwW" type="number" min="0" max="100" value="10">
    </div>
    <div class="col">
      <label for="hwW">Homework %</label>
      <input id="hwW" type="number" min="0" max="100" value="10">
    </div>
  </div>

  <div class="header-row" aria-hidden="true">
    <div class="th">Assignment</div>
    <div class="th">Category</div>
    <div class="th">Score</div>
    <div class="th">Pts</div>
    <div class="th"></div>
  </div>

  <div class="rows" id="rows" aria-live="polite"></div>

  <button id="addBtn" class="primary">＋ Add Assignment</button>
  <button id="calcBtn" class="primary">🧮 Calculate Grade</button>
  <button id="openPowerSchoolBtn" class="primary">Open PowerSchool</button>

  <div class="seg" role="toolbar" aria-label="Data tools">
    <button id="exportBtn">Export</button>
    <button id="importBtn">Import (Files)</button>
    <button id="clearBtn" style="border-color:var(--danger); color:var(--danger);">Clear</button>
  </div>

  <div id="result" class="result" aria-live="polite"></div>
  <input id="filePicker" type="file" accept=".json,application/json" multiple style="display:none"/>
</div>

<script>
// Core logic (same as before, fully functional)
const rowsEl = document.getElementById('rows');
const filePicker = document.getElementById('filePicker');
const resultEl = document.getElementById('result');
const classSelect = document.getElementById('classSelect');
const classSelectContainer = document.getElementById('classSelectContainer');
const deleteClassBtn = document.getElementById('deleteClassBtn');
const openPSBtn = document.getElementById('openPowerSchoolBtn');

let classes = [];
let currentClassIndex = 0;
let assignments = [];

// Demo class blank name
classes.push({
  name: "",
  weights: {Test:60,Quiz:20,Classwork:10,Homework:10},
  assignments: [
    {name:'Sample Test', category:'Test', score:92, pts:100},
    {name:'Signed Quiz', category:'Quiz', score:20, pts:20}
  ],
  hideFromSelector: true
});
assignments = classes[0].assignments.map(a=>({...a}));
document.getElementById('className').value = classes[0].name;
document.getElementById('testW').value = classes[0].weights.Test;
document.getElementById('quizW').value = classes[0].weights.Quiz;
document.getElementById('cwW').value = classes[0].weights.Classwork;
document.getElementById('hwW').value = classes[0].weights.Homework;

function vib(ms=20){ if(navigator.vibrate) navigator.vibrate(ms); }
function escapeHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderRows(){
  rowsEl.innerHTML = '';
  assignments.forEach((a,i)=>{
    const div = document.createElement('div');
    div.className = 'row';
    div.innerHTML = `
      <input class="assign" data-i="${i}" data-field="name" value="${escapeHtml(a.name)}" />
      <select class="cat" data-i="${i}" data-field="category">
        <option ${a.category==='Test'?'selected':''}>Test</option>
        <option ${a.category==='Quiz'?'selected':''}>Quiz</option>
        <option ${a.category==='Classwork'?'selected':''}>Classwork</option>
        <option ${a.category==='Homework'?'selected':''}>Homework</option>
      </select>
      <input class="score" data-i="${i}" data-field="score" type="number" min="0" inputmode="numeric" value="${a.score===undefined?'':a.score}" />
      <input class="pts" data-i="${i}" data-field="pts" type="number" min="0" max="999" inputmode="numeric" value="${a.pts===undefined?'':a.pts}" />
      <div class="remove-wrap"><button class="remove" data-i="${i}">✕</button></div>
    `;
    rowsEl.appendChild(div);
  });
  attachRowListeners();
}

function attachRowListeners(){
  rowsEl.querySelectorAll('input[data-i], select[data-i]').forEach(el=>{
    el.oninput = ()=>{ 
      const i = Number(el.dataset.i); 
      const f = el.dataset.field;
      assignments[i][f] = (f==='score'||f==='pts') ? (el.value===''?'':Number(el.value)) : el.value;
    };
  });
  rowsEl.querySelectorAll('button.remove').forEach(btn=>{
    btn.onclick = ()=>{
      const i = Number(btn.dataset.i);
      if(!confirm('Remove this assignment?')) return;
      assignments.splice(i,1);
      renderRows();
      vib(18);
    };
  });
}

function updateClassSelector(){
  classSelect.innerHTML = '';
  let visibleClasses = classes.filter((c,i)=>!c.hideFromSelector);
  if(visibleClasses.length > 1){
    classSelectContainer.style.display = '';
    visibleClasses.forEach((c,i)=>{
      let displayName = c.name || `Class ${i+2}`;
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = displayName;
      classSelect.appendChild(opt);
    });
    const idxInSelector = visibleClasses.indexOf(classes[currentClassIndex]);
    if(idxInSelector >=0) classSelect.selectedIndex = idxInSelector;
  } else classSelectContainer.style.display = 'none';
}

classSelect.addEventListener('change',()=>{
  let visibleClasses = classes.filter(c=>!c.hideFromSelector);
  currentClassIndex = classes.indexOf(visibleClasses[classSelect.selectedIndex]);
  loadCurrentClass();
});

function loadCurrentClass(){
  const c = classes[currentClassIndex];
  assignments = c.assignments.map(a=>({...a}));
  document.getElementById('className').value = c.name;
  document.getElementById('testW').value = c.weights.Test;
  document.getElementById('quizW').value = c.weights.Quiz;
  document.getElementById('cwW').value = c.weights.Classwork;
  document.getElementById('hwW').value = c.weights.Homework;
  renderRows();
  updateClassSelector();
}

// Add assignment
document.getElementById('addBtn').addEventListener('click',()=>{
  assignments.push({name:'', category:'Classwork', score:'', pts:''});
  renderRows();
  rowsEl.scrollTop = rowsEl.scrollHeight;
  vib(14);
});

// Calculate grade
document.getElementById('calcBtn').addEventListener('click',()=>{
  const weights = {
    Test: Number(document.getElementById('testW').value)/100,
    Quiz: Number(document.getElementById('quizW').value)/100,
    Classwork: Number(document.getElementById('cwW').value)/100,
    Homework: Number(document.getElementById('hwW').value)/100
  };
  const totals = { Test:{e:0,p:0}, Quiz:{e:0,p:0}, Classwork:{e:0,p:0}, Homework:{e:0,p:0} };
  assignments.forEach(a=>{
    const c = a.category || 'Classwork';
    const e = Number(a.score)||0;
    const p = Number(a.pts)||0;
    totals[c].e += e; totals[c].p += p;
  });
  let weighted=0,active=0;
  const parts = [];
  ['Test','Quiz','Classwork','Homework'].forEach(cat=>{
    const t = totals[cat];
    const avg = t.p>0 ? (t.e/t.p)*100 : 0;
    if(t.p>0){ weighted += avg*(weights[cat]||0); active += (weights[cat]||0); }
    parts.push(`${cat}: ${avg.toFixed(2)}% (${t.e}/${t.p})`);
  });
  const final = active>0 ? (weighted/active) : 0;
  resultEl.innerHTML = parts.join('<br>') + `<hr><strong>Final: ${final.toFixed(2)}%</strong>`;
  vib(12);
});

// Export
document.getElementById('exportBtn').addEventListener('click',()=>{
  const c = classes[currentClassIndex];
  c.name = document.getElementById('className').value;
  c.weights = {
    Test: Number(document.getElementById('testW').value),
    Quiz: Number(document.getElementById('quizW').value),
    Classwork: Number(document.getElementById('cwW').value),
    Homework: Number(document.getElementById('hwW').value)
  };
  c.assignments = assignments.map(a=>({...a}));
  const blob = new Blob([JSON.stringify(c, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (c.name || 'class') + '.json';
  a.click();
});

// Clear
document.getElementById('clearBtn').addEventListener('click',()=>{
  if(!confirm('Clear all assignments and reset weights for this class?')) return;
  assignments = [];
  document.getElementById('testW').value = 60;
  document.getElementById('quizW').value = 20;
  document.getElementById('cwW').value = 10;
  document.getElementById('hwW').value = 10;
  renderRows();
  resultEl.innerHTML = 'Cleared';
});

// Import
document.getElementById('importBtn').addEventListener('click',()=> filePicker.click());
filePicker.addEventListener('change', (ev)=>{
  const files = Array.from(ev.target.files);
  files.forEach(f=>{
    const reader = new FileReader();
    reader.onload = e=>{
      try{
        let data = JSON.parse(e.target.result);
        if(!Array.isArray(data.assignments)) data.assignments = [];
        let newClass = {
          name: data.name || '',
          weights: data.weights || {Test:60,Quiz:20,Classwork:10,Homework:10},
          assignments: data.assignments.map(a=>({...a})),
          hideFromSelector: false
        };
        classes.push(newClass);
      } catch(err){console.error(err);}
    };
    reader.readAsText(f);
  });
  setTimeout(()=>{
    currentClassIndex = classes.length-1;
    loadCurrentClass();
    ev.target.value='';
  },300);
});

// Delete class
deleteClassBtn.addEventListener('click',()=>{
  if(!confirm('Delete selected class?')) return;
  let visibleClasses = classes.filter(c=>!c.hideFromSelector);
  const toDelete = visibleClasses[classSelect.selectedIndex];
  const index = classes.indexOf(toDelete);
  if(index>=0) classes.splice(index,1);
  currentClassIndex = 0;
  loadCurrentClass();
});

// Open PowerSchool
openPSBtn.addEventListener('click',()=> window.open('https://hillelyeshiva.powerschool.com','_blank'));

renderRows();
updateClassSelector();
</script>
</body>
</html>
